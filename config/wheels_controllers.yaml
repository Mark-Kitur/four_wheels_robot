controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    velocity_controller:
      type: diff_drive_controller/DiffDriveController


    imu_sensor_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

imu_sensor_broadcaster:
  ros__parameters:
    sensor_name: "imu_sensor"
    frame_id: "imu_link"

velocity_controller:
  ros__parameters:
    left_wheel_names: ["back_left_wheel_joint","front_left_wheel_joint"]
    right_wheel_names: ["back_right_wheel_joint","front_right_wheel_joint"]
      
    wheel_separation: 0.98
    wheel_radius: 0.28

    odom_frame_id: odom
    base_frame_id: base_footprint

    # 3. OPTIONAL: ENABLE IMU FUSION IN DIFF_DRIVE (Set to false if using robot_localization package)
    enable_odom_tf: false
    
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    publish_rate: 50.0
